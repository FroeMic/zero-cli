    Column:
      type: object
      description: A custom property definition. The `id` is used as the key inside the `custom` object on records.
      properties:
        id:
          type: string
          format: uuid
          description: The unique identifier for this custom property. Use this as the key when filtering or updating custom fields on records.
        workspaceId:
          type: string
          format: uuid
        name:
          type: string
          description: Human-readable name of the custom property
        description:
          type: string
          nullable: true
          description: Optional description of the custom property
        key:
          type: string
          description: Dot-notation path for this column, e.g. `custom.<UUID>`. Convenient for constructing filter and update payloads.
        type:
          type: string
          enum:
            - text
            - richtext
            - number
            - currency
            - date
            - timestamp
            - select
            - multiselect
            - boolean
            - url
            - email
            - phone
            - user
            - company
            - companies
            - contact
            - contacts
          description: |
            The data type of the custom property.
            
            | Type | Description |
            |------|-------------|
            | `text` | Plain text string |
            | `richtext` | Rich-text / formatted content |
            | `number` | Numeric value |
            | `currency` | Monetary value |
            | `date` | Date (no time) |
            | `timestamp` | Date and time |
            | `select` | Single choice from a predefined list — use option `key` UUIDs |
            | `multiselect` | Multiple choices from a predefined list — use option `key` UUIDs |
            | `boolean` | True/false |
            | `url` | URL string |
            | `email` | Email address |
            | `phone` | Phone number |
            | `user` | Reference to a workspace user |
            | `company` | Relation to a single company record |
            | `companies` | Relation to multiple company records |
            | `contact` | Relation to a single contact record |
            | `contacts` | Relation to multiple contact records |
        entity:
          type: string
          enum:
            - companies
            - contacts
            - deals
          description: Which record type this custom property belongs to (plural form).
        options:
          type: array
          nullable: true
          description: |
            Available options for `select` and `multiselect` type columns. `null` for all other types.
            
            > **Important:** Use the option `key` UUID (not the `name`) when filtering or updating records.
          items:
            type: object
            properties:
              key:
                type: string
                format: uuid
                description: The UUID value stored on records. Use this when filtering (`$in`, `$overlaps`, exact match) or writing to a select/multiselect field.
              name:
                type: string
                description: Human-readable display name for the option
              color:
                type: string
                description: Hex color code for UI display (e.g. `#4CAF50`)
        ai:
          type: boolean
          description: Whether this column is AI-generated
        archived:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        createdById:
          type: string
          format: uuid

