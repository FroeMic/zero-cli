            ```json
            {
              "type": "doc",
              "content": [
                {
                  "type": "paragraph",
                  "content": [
                    {"type": "text", "text": "Your note text here"}
                  ]
                }
              ]
            }
            ```
        companyId:
          type: string
          format: uuid
          nullable: true
